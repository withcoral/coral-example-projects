# TEMPLATE ONLY -- do NOT commit real secrets.
#
# The real Secret is created out-of-band via `kubectl` (see deploy/README.md),
# never applied from this file. This template exists purely to document every
# env key the sre-agent container expects. All values below are placeholders.
apiVersion: v1
kind: Secret
metadata:
  name: sre-agent-secrets
  namespace: coral-demos
type: Opaque
stringData:
  # Anthropic -- powers the Pydantic AI SRE agent.
  ANTHROPIC_API_KEY: "PLACEHOLDER_ANTHROPIC_API_KEY"

  # Slack -- Socket Mode requires both a bot token and an app-level token.
  SLACK_BOT_TOKEN: "PLACEHOLDER_SLACK_BOT_TOKEN"
  SLACK_APP_TOKEN: "PLACEHOLDER_SLACK_APP_TOKEN"

  # Datadog.
  DD_API_KEY: "PLACEHOLDER_DD_API_KEY"
  DD_APP_KEY: "PLACEHOLDER_DD_APP_KEY"
  DD_SITE: "datadoghq.com"

  # GitHub.
  GITHUB_TOKEN: "PLACEHOLDER_GITHUB_TOKEN"

  # Sentry.
  SENTRY_TOKEN: "PLACEHOLDER_SENTRY_TOKEN"
  SENTRY_ORG: "PLACEHOLDER_SENTRY_ORG"

  # Slack channel the bot listens to / posts in, plus the Datadog Slack app ID
  # used to recognise Datadog-generated alert messages.
  ALERTS_CHANNEL_ID: "PLACEHOLDER_ALERTS_CHANNEL_ID"
  DATADOG_SLACK_APP_ID: "PLACEHOLDER_DATADOG_SLACK_APP_ID"
